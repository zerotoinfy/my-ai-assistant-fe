<main class="login-page">
	<section class="login-shell" aria-label="SBI Document Extractor Login">
		<header class="top-branding">
			<div class="brand-wrap">
				<div class="brand-mark" aria-hidden="true">
					<svg viewBox="0 0 64 64" focusable="false">
						<rect x="7" y="9" width="42" height="46" rx="7" fill="#3d93e6" />
						<rect x="16" y="16" width="24" height="28" rx="3" fill="#f2f8ff" />
						<rect x="20" y="22" width="16" height="2.5" fill="#3d93e6" />
						<rect x="20" y="28" width="16" height="2.5" fill="#3d93e6" />
						<rect x="20" y="34" width="12" height="2.5" fill="#3d93e6" />
						<circle cx="52" cy="45" r="10" fill="#1fa86d" />
						<text x="48.4" y="48.5" fill="#ffffff" font-size="10" font-family="Arial, sans-serif">$</text>
					</svg>
				</div>
				<h1>SBI Document Extractor</h1>
			</div>
		</header>

		<div class="login-content">
			<h2>Welcome to Your Account</h2>

			<form class="login-card" [formGroup]="loginForm" (ngSubmit)="onLogin()">
				<div class="status" style="margin-bottom: 8px;">
					Demo Accounts:
					`Maker` -> maker.sbi@bank.com / Maker@123,
					`Checker` -> checker.sbi@bank.com / Checker@123
				</div>

				<label class="field" for="email">
					<span class="field-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<circle cx="12" cy="8" r="4" fill="#7c96b5"></circle>
							<path d="M4 20c0-4.2 3.6-7 8-7s8 2.8 8 7" fill="#7c96b5"></path>
						</svg>
					</span>
					<input id="email" type="email" formControlName="email" placeholder="Email Address" />
				</label>
				<p class="error-text" *ngIf="emailError">{{ emailError }}</p>

				<label class="field" for="password">
					<span class="field-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<rect x="6" y="10" width="12" height="10" rx="2" fill="#7c96b5"></rect>
							<path d="M8 10V7.8A4 4 0 0 1 12 4a4 4 0 0 1 4 3.8V10" stroke="#7c96b5" stroke-width="2" fill="none"></path>
						</svg>
					</span>
					<input id="password" type="password" formControlName="password" placeholder="Password" />
				</label>
				<p class="error-text" *ngIf="passwordError">{{ passwordError }}</p>

				<div class="actions-row">
					<label class="remember-wrap" for="rememberMe">
						<input id="rememberMe" type="checkbox" formControlName="rememberMe" />
						<span>Remember me</span>
					</label>
					<button class="text-action" type="button">Forgot Password?</button>
				</div>

				<button class="login-btn" type="submit" [disabled]="isSubmitting">
					{{ isSubmitting ? 'Logging in...' : 'Login' }}
				</button>

				<p class="signup-text">
					Don't have an account?
					<button class="text-action signup" type="button">Sign Up</button>
				</p>

				<p class="status" *ngIf="loginStatusMessage">{{ loginStatusMessage }}</p>
			</form>

			<div class="decor-art" aria-hidden="true">
				<div class="paper paper-a"></div>
				<div class="paper paper-b"></div>
				<div class="paper paper-c"></div>
			</div>
		</div>

		<footer class="bottom-links">
			<button type="button">Terms &amp; Conditions</button>
			<span class="separator"></span>
			<button type="button">Privacy Policy</button>
		</footer>
	</section>
</main>
